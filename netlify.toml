[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Functions must come before the SPA catch-all
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
